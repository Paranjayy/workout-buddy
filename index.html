<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Workout Buddy — Your personal fitness coach, calorie tracker, and life progress dashboard. Track workouts, log nutrition from global cuisines, visualize your life progress, and stay motivated with curated playlists." />
  <title>Workout Buddy — Fitness · Nutrition · Life</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__brand">
        <svg class="sidebar__logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2.5"/>
          <path d="M10 20 L14 12 L18 18 L22 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="sidebar__title">Workout Buddy</span>
      </div>
      <nav id="sidebar-nav" class="sidebar__nav" aria-label="Main navigation"></nav>
      <div class="sidebar__footer">
        <button id="btn-settings" class="sidebar__settings-btn" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          Settings
        </button>
      </div>
    </aside>
    <main id="main-content" class="main"></main>
  </div>

  <!-- YouTube IFrame API (loaded lazily) -->
  <div id="yt-mini-player" class="mini-player mini-player--hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
